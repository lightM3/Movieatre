<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movietre</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0F172A, #1E1B4B);
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }
    .glass-container {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      padding: 40px;
      text-align: center;
      max-width: 400px;
      width: 90%;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }
    .logo {
      font-size: 32px;
      font-weight: 800;
      background: -webkit-linear-gradient(#fff, #9ca3af);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 16px;
      letter-spacing: -1px;
    }
    .message {
      font-size: 16px;
      color: #cbd5e1;
      line-height: 1.5;
      margin-bottom: 30px;
    }
    .desktop-warning {
      display: none;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      padding: 16px;
      border-radius: 12px;
      color: #fca5a5;
      font-size: 14px;
      margin-top: 20px;
    }
    .btn {
      display: none;
      background: #4f46e5;
      color: white;
      text-decoration: none;
      padding: 14px 28px;
      border-radius: 12px;
      font-weight: 600;
      transition: all 0.3s ease;
      box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.4);
    }
    .btn:hover {
      background: #4338ca;
      transform: translateY(-2px);
      box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.5);
    }
    .spinner {
      display: inline-block;
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255,255,255,0.1);
      border-radius: 50%;
      border-top-color: #4f46e5;
      animation: spin 1s ease-in-out infinite;
      margin-bottom: 20px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <div class="glass-container">
    <div id="loadingIndicator" class="spinner"></div>
    <div class="logo">Movietre</div>
    <div class="message" id="statusMessage">
      Uygulama açılıyor, lütfen bekleyin...
    </div>
    
    <a href="#" id="storeBtn" class="btn">Mağazaya Git</a>
    
    <div id="desktopWarning" class="desktop-warning">
      ⚠️ Movietre sadece mobil cihazlarda çalışmaktadır.<br><br>
      Lütfen bu bağlantıyı telefonunuzdan açmayı deneyin.
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const userAgent = navigator.userAgent || navigator.vendor || window.opera;
      const statusMessage = document.getElementById("statusMessage");
      const storeBtn = document.getElementById("storeBtn");
      const desktopWarning = document.getElementById("desktopWarning");
      const loadingIndicator = document.getElementById("loadingIndicator");
      
      const isAndroid = /android/i.test(userAgent);
      const isIOS = /iPad|iPhone|iPod/.test(userAgent) && !window.MSStream;

      if (!isAndroid && !isIOS) {
        // Masaüstü Kullanıcı
        loadingIndicator.style.display = "none";
        statusMessage.innerText = "Masaüstü erişimi desteklenmiyor.";
        desktopWarning.style.display = "block";
      } else {
        // Mobil Kullanıcı - 2.5 saniye sonra fallback butonunu göster
        setTimeout(() => {
          loadingIndicator.style.display = "none";
          
          if (isAndroid) {
            statusMessage.innerText = "Uygulama açılamadı. Movietre'yi indirmek için Play Store'a gidin.";
            storeBtn.href = "https://play.google.com/store/apps/details?id=com.example.movietre";
            storeBtn.innerText = "Play Store'a Git";
            storeBtn.style.display = "inline-block";
          } else if (isIOS) {
            statusMessage.innerText = "Uygulama açılamadı. Movietre'yi indirmek için App Store'a gidin.";
            storeBtn.href = "https://apps.apple.com/app/idPLACEHOLDER";
            storeBtn.innerText = "App Store'a Git";
            storeBtn.style.display = "inline-block";
          }
        }, 2500); // Uygulamanın açılması için biraz zaman tanı
      }
    });
  </script>
</body>
</html>
