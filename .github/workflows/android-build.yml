name: Android Build Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build_android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      # 1. Kodu çekme (Checkout)
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Java Ortamını Kurma (Zulu Java 17 + Gradle Caching)
      - name: Setup Java Environment
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      # 3. Flutter Ortamını Kurma (Stable Channel + Flutter Caching)
      - name: Setup Flutter Environment
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
          # cache-key ve cache-path değerleri varsayılan olarak optimize edilmiştir.

      # 4. .env Tuzağını Çözmek (Boş bir .env dosyası oluştur)
      - name: Create Dummy .env
        run: touch .env

      # 5. Bağımlılıkları Yükleme
      - name: Install Dependencies
        run: flutter pub get

      - name: Patch isar_flutter_libs build.gradle
        run: |
          ISAR_GRADLE="$HOME/.pub-cache/hosted/pub.dev/isar_flutter_libs-3.1.0+1/android/build.gradle"
          if [ -f "$ISAR_GRADLE" ]; then
            sed -i 's/compileSdkVersion 30/compileSdkVersion 36/' "$ISAR_GRADLE"
            sed -i 's/compileSdk 30/compileSdk 36/' "$ISAR_GRADLE"
            echo "✅ isar_flutter_libs patched"
          fi

      # 5. Kod Analizi (Hatalı kodlar varsa derlemeyi durdurur)
      - name: Dart Analyze
        run: dart analyze

      # 6. Kod Üretimi (Build Runner: Riverpod, Isar, Freezed jeneratörleri için)
      - name: Run Build Runner
        run: dart run build_runner build -d

      # 7. Android Release APK Derleme
      - name: Build APK (Release)
        run: flutter build apk --release

      # 8. Üretilen APK'yı GitHub Artifacts olarak Yükleme
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: movietre-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7
